name: Checks

on: push

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master

    - uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install packages
      run: npm i -g pnpm && pnpm install --frozen-lockfile
    
    - name: Lint
      run: pnpm run lint

    - name: Build
      run: pnpm run build

    - name: Test
      run: pnpm exec vitest run
